<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台成绩管理</title>
    <style>
        body { font-family: sans-serif; padding: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>实时成绩看板</h2>
    <table>
        <tr>
            <th>序号</th>
            <th>姓名</th>
            <th>得分</th>
        </tr>
        {% for result in results %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ result.name }}</td>
            <td><b>{{ result.score }}</b></td>
        </tr>
        {% else %}
        <tr><td colspan="3" style="text-align:center;">暂无人参加测试</td></tr>
        {% endfor %}
    </table>
</body>
</html>
